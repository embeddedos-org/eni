name: Nightly
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  full-build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi cppcheck lcov

      - name: Build (Debug + All Features)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENI_BUILD_TESTS=ON
          cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 120

  sanitizer-checks:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        sanitizer: [asan, ubsan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure with ${{ matrix.sanitizer }}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DENI_BUILD_TESTS=ON \
            -DENI_ENABLE_ASAN=${{ matrix.sanitizer == 'asan' && 'ON' || 'OFF' }} \
            -DENI_ENABLE_UBSAN=${{ matrix.sanitizer == 'ubsan' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build

      - name: Run tests under sanitizer
        run: ctest --test-dir build --output-on-failure --timeout 300

  cross-compile:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [arm-cortex-m4, riscv32]
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        if: matrix.target == 'arm-cortex-m4'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi

      - name: Install RISC-V toolchain
        if: matrix.target == 'riscv32'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          wget -q https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v13.2.0-2/xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz
          sudo tar -xzf xpack-riscv-none-elf-gcc-13.2.0-2-linux-x64.tar.gz -C /opt/
          echo "/opt/xpack-riscv-none-elf-gcc-13.2.0-2/bin" >> $GITHUB_PATH

      - name: Cross-compile
        run: |
          cmake --preset ${{ matrix.target }} || cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-${{ matrix.target }}.cmake -DCMAKE_BUILD_TYPE=MinSizeRel -DENI_BUILD_CLI=OFF -DENI_BUILD_FRAMEWORK=OFF -DENI_BUILD_TESTS=OFF
          cmake --build build 2>&1 || cmake --build build/${{ matrix.target }} 2>&1
