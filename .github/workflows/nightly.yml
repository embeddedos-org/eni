name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  native-build:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DENI_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  cross-compile:
    name: Cross (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-linux
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - arch: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
          - arch: riscv64-linux
            packages: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure
        run: cmake -B build -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Verify artifacts
        run: |
          echo "=== Static libraries ==="
          find build -name "*.a" | sort
          LIB_COUNT=$(find build -name "*.a" | wc -l)
          echo "Found $LIB_COUNT libraries"
          if [ "$LIB_COUNT" -lt 1 ]; then
            echo "ERROR: No libraries produced"
            exit 1
          fi

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [native-build, cross-compile]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Nightly Regression Report — ENI"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Native builds | ${{ needs.native-build.result }} |"
          echo "| Cross-compile | ${{ needs.cross-compile.result }} |"
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.cross-compile.result }}" != "success" ]; then
            echo ""
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo ""
          echo "✅ All checks passed"
