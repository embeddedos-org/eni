name: Release
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Build and test
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENI_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  release:
    needs: validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi

      - name: Build native release
        run: |
          cmake -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/release

      - name: Cross-compile ARM Cortex-M4
        run: |
          cmake -B build/arm -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-arm-cortex-m4.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DENI_BUILD_CLI=OFF -DENI_BUILD_FRAMEWORK=OFF -DENI_BUILD_TESTS=OFF
          cmake --build build/arm

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar czf dist/eni-${{ github.ref_name }}-linux-x86_64.tar.gz -C build/release .
          tar czf dist/eni-${{ github.ref_name }}-arm-cortex-m4.tar.gz -C build/arm .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
