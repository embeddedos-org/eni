name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -DENI_BUILD_TESTS=ON
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - arch: aarch64-linux
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            artifact_suffix: aarch64-linux
          - arch: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            artifact_suffix: arm-linux-gnueabihf
          - arch: riscv64-linux
            packages: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            artifact_suffix: riscv64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Cross-compile
        run: |
          cmake -B build-${{ matrix.arch }} -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }}
      - name: Package artifacts
        run: |
          mkdir -p staging
          find build-${{ matrix.arch }} -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz -C staging .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eni-${{ matrix.artifact_suffix }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Build native artifacts
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir -p staging
          find build -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz -C staging .
      - name: Download cross-compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eni-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ENI ${{ steps.version.outputs.tag }}"
          body: |
            ## ENI ${{ steps.version.outputs.tag }} — Neural Interface Adapter
            Initial release of the Neural Interface Adapter library.
          files: "*.tar.gz"
name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -DENI_BUILD_TESTS=ON
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - arch: aarch64-linux
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            artifact_suffix: aarch64-linux
          - arch: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            artifact_suffix: arm-linux-gnueabihf
          - arch: riscv64-linux
            packages: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            artifact_suffix: riscv64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cross-compile
        run: |
          cmake -B build-${{ matrix.arch }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }}

      - name: Package artifacts
        run: |
          mkdir -p staging
          find build-${{ matrix.arch }} -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eni-${{ matrix.artifact_suffix }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          IFS='.-' read -r MAJOR MINOR PATCH PRE <<< "$VERSION"
          echo "prerelease=${PRE:-stable}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ steps.version.outputs.tag }}" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          else
            CHANGES=$(git log --oneline --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build native (x86_64) artifacts
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir -p staging
          find build -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz -C staging .

      - name: Download cross-compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eni-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ENI ${{ steps.version.outputs.tag }}"
          body: |
            ## ENI ${{ steps.version.outputs.tag }} — Neural Interface Adapter

            ### Architectures
            | Archive | Target |
            |---|---|
            | `eni-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz` | x86_64 Linux (native) |
            | `eni-${{ steps.version.outputs.version }}-aarch64-linux.tar.gz` | AArch64 Linux |
            | `eni-${{ steps.version.outputs.version }}-arm-linux-gnueabihf.tar.gz` | ARM Linux hard-float |
            | `eni-${{ steps.version.outputs.version }}-riscv64-linux.tar.gz` | RISC-V 64 Linux |

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: "*.tar.gz"
          draft: ${{ contains(steps.version.outputs.prerelease, 'debug') }}
          prerelease: ${{ contains(steps.version.outputs.prerelease, 'rc') || contains(steps.version.outputs.prerelease, 'beta') }}
