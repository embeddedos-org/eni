name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -DENI_BUILD_TESTS=ON
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - arch: aarch64-linux
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            artifact_suffix: aarch64-linux
          - arch: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            artifact_suffix: arm-linux-gnueabihf
          - arch: riscv64-linux
            packages: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            artifact_suffix: riscv64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Cross-compile
        run: |
          cmake -B build-${{ matrix.arch }} -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }}
      - name: Package artifacts
        run: |
          mkdir -p staging
          find build-${{ matrix.arch }} -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz -C staging .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eni-${{ matrix.artifact_suffix }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Build native artifacts
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir -p staging
          find build -name "*.a" -exec cp {} staging/ \;
          tar czf eni-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz -C staging .
      - name: Download cross-compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eni-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ENI ${{ steps.version.outputs.tag }}"
          body: |
            ## ENI ${{ steps.version.outputs.tag }} ΓÇö Neural Interface Adapter
            Initial release of the Neural Interface Adapter library.
          files: "*.tar.gz"
