name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          cmake -B build -DENI_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            cc: gcc
            pkg: ""
          - arch: aarch64-linux
            cc: aarch64-linux-gnu-gcc
            pkg: gcc-aarch64-linux-gnu
          - arch: arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            pkg: gcc-arm-linux-gnueabihf
          - arch: riscv64-linux
            cc: riscv64-linux-gnu-gcc
            pkg: gcc-riscv64-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        if: matrix.pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Package
        run: |
          mkdir -p staging/include staging/lib
          find build -name "*.a" -exec cp {} staging/lib/ \;
          cp -r common/include/* staging/include/ 2>/dev/null || true
          cp -r framework/include/* staging/include/ 2>/dev/null || true
          cp -r min/include/* staging/include/ 2>/dev/null || true
          tar czf eni-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: eni-${{ matrix.arch }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eni-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eNI ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            *.tar.gz
            SHA256SUMS.txt
          prerelease: ${{ contains(steps.version.outputs.tag, 'rc') || contains(steps.version.outputs.tag, 'beta') }}
