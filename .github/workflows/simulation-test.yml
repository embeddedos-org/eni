name: Simulation Test

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  EOSIM_VERSION: "0.1.0"

jobs:
  simulate:
    name: Simulate (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x86_64-linux, arm64-linux, riscv64-linux, stm32f4, raspi4, esp32, nrf52]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install EoSim from source
        run: |
          git clone --depth 1 --branch v${{ env.EOSIM_VERSION }} https://github.com/embeddedos-org/EoSim.git /tmp/EoSim
          pip install -e /tmp/EoSim
      - name: Validate platform
        run: eosim list
      - name: Run simulation
        run: eosim run ${{ matrix.platform }} --headless --timeout 15

  cross-platform:
    name: Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install EoSim
        run: pip install "eosim @ https://github.com/embeddedos-org/EoSim/releases/download/v${{ env.EOSIM_VERSION }}/eosim-${{ env.EOSIM_VERSION }}-py3-none-any.whl"
      - name: Validate
        run: eosim list && eosim doctor

  sanity-gate:
    name: Simulation Gate
    runs-on: ubuntu-latest
    needs: [simulate, cross-platform]
    if: always()
    steps:
      - name: Results
        run: |
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Simulations | ${{ needs.simulate.result }} |"
          echo "| Cross-platform | ${{ needs.cross-platform.result }} |"
          if [ "${{ needs.simulate.result }}" != "success" ]; then
            echo "FAIL"; exit 1
          fi
          echo "PASS"
